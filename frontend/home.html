<!DOCTYPE html>
<html>

<head>

    <title>NovaShop</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-nav">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3" href="#">
            🛍️ NovaShop
        </a>

        <div>

            <a href="cart.html" class="btn btn-warning me-2">
                <i class="fa fa-cart-shopping"></i>
                Cart
            </a>

            <a href="orders.html" class="btn btn-info me-2">
                Orders
            </a>

            <button
                class="btn btn-danger"
                onclick="logout()">

                Logout

            </button>

        </div>

    </div>

</nav>

<section class="hero-section">

    <div class="container">

        <h1>NovaShop</h1>

        <p>
            India's Smart Shopping Destination
        </p>

        <input
            type="text"
            id="search"
            placeholder="Search Mobiles, Laptops, Accessories..."
            class="form-control search-box">

        <div class="mt-4">

            <button
                class="btn btn-primary category-btn">

                All

            </button>

            <button
                class="btn btn-success category-btn">

                Mobiles

            </button>

            <button
                class="btn btn-warning category-btn">

                Laptops

            </button>

            <button
                class="btn btn-info category-btn">

                Accessories

            </button>

        </div>

    </div>

</section>

<div class="container mt-5">

    <div class="row" id="product-list"></div>

</div>

<footer>

    <h5>NovaShop</h5>

    <p>
        Premium Shopping Experience
    </p>

</footer>

<div id="toast"></div>

<script src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

    <title>NovaShop Smart Tracking</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:#f4f6f9;
        }

        .navbar{
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .tracking-card{
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .tracking-header{
            background:#0d6efd;
            color:white;
            padding:15px;
        }

        .tracking-id{
            font-size:18px;
            font-weight:bold;
            color:#0d6efd;
        }

        .location-box{
            background:#eef5ff;
            padding:10px;
            border-radius:10px;
        }

        .progress{
            height:20px;
            border-radius:20px;
        }

        .step{
            font-size:14px;
            font-weight:bold;
        }

        .footer{
            text-align:center;
            color:gray;
            margin-top:30px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <h3 class="text-white">
            📦 NovaShop Smart Tracking
        </h3>

        <a href="home.html"
           class="btn btn-warning">

            Continue Shopping

        </a>

    </div>

</nav>

<div class="container mt-4">

    <div id="orders-container">

    </div>

</div>

<div class="footer">

    <p>
        NovaShop Logistics Tracking System
    </p>

</div>

<script src="js/orders.js"></script>

</body>

</html>
